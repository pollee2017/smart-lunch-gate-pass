<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Lunch Gate Pass - Fully Automated</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }
        .container { 
            max-width: 700px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 10px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: #64748b;
        }
        .mode-btn.active {
            background: white;
            color: #203a43;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 6px; color: #34495e; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
        input:focus, select:focus { outline: none; border-color: #203a43; }
        .btn-main { 
            width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;
            background: linear-gradient(135deg, #203a43 0%, #2c5364 100%); color: white; transition: all 0.3s; margin-top: 10px;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(32, 58, 67, 0.4); }
        
        .gps-status { text-align: center; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; display: none; font-size: 14px; }
        .gps-status.active { display: block; }
        .gps-status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .gps-status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .gps-status.loading { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; animation: pulse 1.5s infinite; }
        
        h2 { margin-top: 30px; margin-bottom: 15px; color: #2c3e50; font-size: 18px; }
        .card { background: #f8fafc; border-left: 5px solid #203a43; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card.success-card { border-left: 5px solid #2ecc71; background: #f0fff4; }
        .card.timeout-card { border-left: 5px solid #e74c3c; background: #fff5f5; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .timer { font-size: 26px; font-weight: bold; color: #203a43; }
        .timer.danger { color: #d32f2f; animation: blink 0.5s infinite; }
        
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-top: 5px; }
        .status-outside { background-color: #fff3cd; color: #856404; }
        .status-inside { background-color: #d4edda; color: #155724; }
        .status-timeout { background-color: #f8d7da; color: #721c24; }
        
        .card-buttons { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
        .btn-delete { background: #e74c3c; color: white; font-size: 13px; padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;}
        .empty-message { text-align: center; padding: 30px 20px; color: #999; font-size: 14px; }
        
        .live-indicator { display: inline-flex; align-items: center; gap: 5px; color: #e74c3c; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
        .dot { width: 8px; height: 8px; background: #e74c3c; border-radius: 50%; animation: blink 1s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    </style>
</head>
<body>

<div class="container">
    <div class="mode-selector">
        <button id="modeStudent" class="mode-btn active" onclick="switchMode('student')">👨‍🎓 โหมดนักเรียน</button>
        <button id="modeAdmin" class="mode-btn" onclick="switchMode('admin')">🔒 โหมดอาจารย์ฝ่ายปกครอง</button>
    </div>

    <h1 id="mainTitle">🛰️ ระบบบันทึกเวลาและเช็กอินอัตโนมัติ (หน้าจอนักเรียน)</h1>
    
    <div class="live-indicator"><span class="dot"></span> ระบบ Geofencing ตรวจจับพิกัดอัตโนมัติกำลังทำงาน</div>
    
    <div id="gpsStatus" class="gps-status"></div>
    
    <div id="checkoutForm">
        <div class="form-group">
            <label>ชื่อ-นามสกุล:</label>
            <input type="text" id="name" placeholder="ระบุชื่อ-นามสกุลของคุณ">
        </div>
        <div class="form-group">
            <label>เลขทะเบียนรถ:</label>
            <input type="text" id="plate" placeholder="เช่น 1กข 1234 สุรินทร์">
        </div>
        <div class="form-group">
            <label>เบอร์โทรศัพท์:</label>
            <input type="tel" id="phone" placeholder="08xxxxxxxx">
        </div>
        <div class="form-group">
            <label>ระยะเวลาพักเที่ยง:</label>
            <select id="duration">
                <option value="30">30 นาที</option>
                <option value="45">45 นาที</option>
                <option value="50" selected>50 นาที (ปกติ)</option>
                <option value="60">60 นาที</option>
            </select>
        </div>
        <button class="btn-main" id="btnSubmit">📍 ยืนยันบันทึกเวลาออกจากวิทยาลัย</button>
    </div>

    <h2 id="listTitle">📊 รายการติดตามรถนักเรียนเรียบร้อย (อัตโนมัติ)</h2>
    <div id="list-container">
        <div class="empty-message">ยังไม่มีข้อมูลการบันทึกออกในขณะนี้</div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "123456"; 
    let currentMode = "student";     

    // 📍 ขอบเขตวิทยาลัย (พิกัดจังหวัดสุรินทร์)
    const SAFE_ZONE = {
        latitude: 14.882420,   
        longitude: 103.493920,
        radius: 150.0 // รัศมี 150 เมตร ถ้ารถวิ่งเข้ามาระยะนี้ ระบบจะปลดล็อกอัตโนมัติ
    };

    let vehicleList = JSON.parse(localStorage.getItem('auto_geofence_list')) || [];

    document.getElementById('btnSubmit').addEventListener('click', startCheckout);

    // เปิดระบบดักจับพิกัดพื้นหลังอัตโนมัติทันทีเมื่อเปิดหน้าเว็บ
    initBackgroundTracking();

    function switchMode(mode) {
        if (mode === 'admin') {
            let password = prompt("🔒 [พื้นที่เฉพาะอาจารย์] กรุณากรอกรหัสผ่านฝ่ายปกครอง:");
            if (password === ADMIN_PASSWORD) {
                currentMode = "admin";
                document.getElementById('modeAdmin').classList.add('active');
                document.getElementById('modeStudent').classList.remove('active');
                document.getElementById('mainTitle').textContent = "🛡️ แผงควบคุมและตรวจสอบประวัติ (หน้าจออาจารย์)";
                document.getElementById('listTitle').textContent = "📊 รายการข้อมูลทั้งหมดในระบบ";
                showGpsStatus('🔓 เข้าสู่โหมดอาจารย์สำเร็จ สามารถลบประวัติได้', 'success');
            } else {
                if(password !== null) alert("❌ รหัสผ่านไม่ถูกต้อง!");
                return;
            }
        } else {
            currentMode = "student";
            document.getElementById('modeStudent').classList.add('active');
            document.getElementById('modeAdmin').classList.remove('active');
            document.getElementById('mainTitle').textContent = "🛰️ ระบบบันทึกเวลาและเช็กอินอัตโนมัติ (หน้าจอนักเรียน)";
            document.getElementById('listTitle').textContent = "📊 รายการรถนักเรียนที่อยู่ระหว่างทำธุระข้างนอก";
        }
        renderList();
    }

    function startCheckout() {
        let name = document.getElementById('name').value.trim();
        let plate = document.getElementById('plate').value.trim();
        let phone = document.getElementById('phone').value.trim();
        let duration = parseInt(document.getElementById('duration').value);

        if (!name || !plate || !phone) {
            showGpsStatus('🚨 กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
            return;
        }

        let vehicle = {
            id: Date.now(),
            name: name,
            plate: plate,
            phone: phone,
            duration: duration,
            startTime: Date.now(),
            returnTime: null,
            savedRemainingTime: null,
            status: 'outside'
        };

        vehicleList.push(vehicle);
        saveData();
        renderList();

        document.getElementById('name').value = '';
        document.getElementById('plate').value = '';
        document.getElementById('phone').value = '';
        showGpsStatus('✅ บันทึกออกสำเร็จ! ระบบกำลังตรวจจับพิกัดขากลับของคุณอัตโนมัติ', 'success');
    }

    function renderList() {
        const container = document.getElementById('list-container');
        if (vehicleList.length === 0) {
            container.innerHTML = '<div class="empty-message">ยังไม่มีข้อมูลการบันทึกออกในขณะนี้</div>';
            return;
        }

        const nowStamp = Date.now();

        container.innerHTML = vehicleList.map(vehicle => {
            let timeDisplay = '';
            let timerClass = '';
            let cardClass = 'card';
            let statusBadge = '';
            let actionButtons = '';

            if (vehicle.status === 'inside') {
                cardClass = 'card success-card';
                timeDisplay = vehicle.savedRemainingTime || 'เข้าเรียนแล้ว'; 
                statusBadge = `<span class="status-badge status-inside">✅ เช็กอินอัตโนมัติสำเร็จเมื่อ ${vehicle.returnTime}</span>`;
                
                if (currentMode === 'admin') {
                    actionButtons = `<div class="card-buttons"><button class="btn-delete" onclick="deleteVehicle(${vehicle.id})">🗑️ ลบประวัติ</button></div>`;
                }
            } else {
                const totalMs = vehicle.duration * 60 * 1000;
                const elapsedMs = nowStamp - vehicle.startTime;
                const remainingMs = totalMs - elapsedMs;

                if (remainingMs <= 0) {
                    vehicle.status = 'timeout';
                    cardClass = 'card timeout-card';
                    timeDisplay = '00:00';
                    timerClass = 'danger';
                    statusBadge = '<span class="status-badge status-timeout">🚨 สายเกินกำหนด / ยังไม่กลับเข้าวิทยาลัย</span>';
                } else {
                    let mins = Math.floor(remainingMs / 60000);
                    let secs = Math.floor((remainingMs % 60000) / 1000);
                    timeDisplay = `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
                    if (remainingMs <= 300000) timerClass = 'warning';
                    statusBadge = '<span class="status-badge status-outside">📍 อยู่ข้างนอก (ระบบกำลังสแกนพิกัดขากลับ...)</span>';
                }

                if (currentMode === 'admin') {
                    actionButtons = `
                        <div class="card-buttons">
                            <button class="btn-delete" onclick="deleteVehicle(${vehicle.id})">🗑️ ลบรายชื่อ</button>
                        </div>
                    `;
                }
            }

            return `
                <div class="${cardClass}">
                    <div class="card-header">
                        <span>🚗 ทะเบียน: <strong>${vehicle.plate}</strong></span>
                        <span class="timer ${timerClass}">${timeDisplay}</span>
                    </div>
                    <div class="card-info">
                        <strong>นักเรียน:</strong> ${vehicle.name} | <strong>ติดต่อ:</strong> ${vehicle.phone}
                    </div>
                    ${statusBadge}
                    ${actionButtons}
                </div>
            `;
        }).join('');
    }

    // 🛰️ ฟังก์ชันหัวใจสำคัญ: ดักจับพิกัดแบบเรียลไทม์อัตโนมัติ (Geofencing)
    function initBackgroundTracking() {
        if (!navigator.geolocation) return;

        // watchPosition จะทำงานเองอัตโนมัติทุกครั้งที่โทรศัพท์เคลื่อนที่หรือพิกัดเปลี่ยน
        navigator.geolocation.watchPosition(
            (position) => {
                let userLat = position.coords.latitude;
                let userLng = position.coords.longitude;

                // คำนวณระยะห่างปัจจุบันเทียบกับจุดศูนย์กลางวิทยาลัย
                let distance = calcDistance(userLat, userLng, SAFE_ZONE.latitude, SAFE_ZONE.longitude);

                let updated = false;

                // วนลูปเช็กทุกคนที่สถานะยังอยู่ข้างนอก (outside)
                vehicleList.forEach(vehicle => {
                    if (vehicle.status === 'outside' && distance <= SAFE_ZONE.radius) {
                        // 🌟 ถ้าระยะห่างน้อยกว่ารัศมีวิทยาลัย ให้เคลียร์และหยุดเวลาทันทีอัตโนมัติ!
                        const totalMs = vehicle.duration * 60 * 1000;
                        const elapsedMs = Date.now() - vehicle.startTime;
                        const remainingMs = Math.max(0, totalMs - elapsedMs);
                        
                        let mins = Math.floor(remainingMs / 60000);
                        let secs = Math.floor((remainingMs % 60000) / 1000);
                        
                        vehicle.savedRemainingTime = `เหลือ ${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
                        vehicle.status = 'inside';
                        vehicle.returnTime = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}) + " น.";
                        updated = true;
                    }
                });

                if (updated) {
                    saveData();
                    renderList();
                    showGpsStatus('🎉 ระบบตรวจพบว่าคุณขับรถกลับเข้าวิทยาลัยแล้ว! ทำการเช็กอินอัตโนมัติเรียบร้อย', 'success');
                }
            },
            (error) => { console.log('GPS tracking error: ', error.message); },
            { enableHighAccuracy: true, maximumAge: 0 }
        );
    }

    function calcDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * R * 1000;
    }

    function deleteVehicle(vehicleId) {
        if (confirm('ยืนยันที่จะลบข้อมูลรายการนี้หรือไม่?')) {
            vehicleList = vehicleList.filter(v => v.id !== vehicleId);
            saveData();
            renderList();
        }
    }

    function saveData() { localStorage.setItem('auto_geofence_list', JSON.stringify(vehicleList)); }

    function showGpsStatus(message, type) {
        const statusEl = document.getElementById('gpsStatus');
        statusEl.textContent = message; statusEl.className = `gps-status active ${type}`;
        setTimeout(() => { statusEl.classList.remove('active'); }, 5000);
    }

    // ลูปรันเวลาถอยหลังบนหน้าจอปกติ
    setInterval(() => {
        let changed = false;
        vehicleList.forEach(v => {
            if (v.status === 'outside') {
                const elapsed = Date.now() - v.startTime;
                const total = v.duration * 60 * 1000;
                if (elapsed >= total) { v.status = 'timeout'; changed = true; }
            }
        });
        if (changed) saveData();
        renderList();
    }, 1000);

    renderList();
</script>
</body>
</html>
