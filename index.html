<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Lunch Gate Pass - GPS Verification</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #34495e; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; -webkit-appearance: none; appearance: none; }
        button { background-color: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; touch-action: manipulation; }
        button:active { background-color: #1e7e34; }
        .card { background: #fdfefe; border: 1px solid #e2e8f0; padding: 15px; margin-top: 15px; border-radius: 8px; position: relative; }
        .timer { font-size: 24px; font-weight: bold; color: #2980b9; float: right; }
        .timeout { color: #c0392b !important; animation: blink 1s infinite; }
        .info-text { display: inline-block; width: 70%; }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .status-outside { background-color: #ffeaa7; color: #d63031; }
        
        /* Modal UI ป้องกัน iOS บล็อคระบบแจ้งเตือน */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; max-width: 450px; width: 100%; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .modal-btn-group { display: flex; gap: 12px; margin-top: 20px; }
        .btn-blue { background-color: #3498db; margin: 0; }
        .btn-red { background-color: #e74c3c; margin: 0; }
        .btn-close { background-color: #7f8c8d; display: none; margin-top: 20px; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>⏱️ ระบบบันทึกเวลาออกและนับถอยหลัง (ตรวจสอบ GPS)</h2>
    
    <label>ชื่อ-นามสกุล:</label>
    <input type="text" id="name" placeholder="ชื่อ นักเรียน">

    <label>เลขทะเบียนรถ:</label>
    <input type="text" id="plate" placeholder="เช่น 1กข 1234">

    <label>เบอร์โทรศัพท์:</label>
    <input type="text" id="phone" placeholder="08xxxxxxxx">

    <label>ระยะเวลาที่อนุญาต (นาที):</label>
    <select id="duration">
        <option value="30">30 นาที</option>
        <option value="45">45 นาที</option>
        <option value="50" selected>50 นาที (แนะนำสำหรับพักเที่ยง)</option>
        <option value="60">60 นาที</option>
    </select>

    <button id="btnSubmit">บันทึกเวลาออกและเริ่มนับถอยหลัง</button>

    <h3>📊 รายการรถที่อยู่ระหว่างพักเที่ยง</h3>
    <div id="list-container"></div>
</div>

<!-- หน้าต่างจำลองสถานการณ์พิกัด GPS -->
<div id="gpsModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0; color:#2c3e50;">🔮 ตรวจสอบพิกัด GPS</h3>
        <p id="modalText" style="color:#7f8c8d; font-size:16px; line-height: 1.5;"></p>
        <div id="modalActionButtons" class="modal-btn-group">
            <button class="btn-blue" id="btnSuccess">ตกลง (อยู่ในวิทยาลัย)</button>
            <button class="btn-red" id="btnFail">ยกเลิก (อยู่ข้างนอก)</button>
        </div>
        <button class="btn-close" id="btnCloseModal">ปิดหน้าต่างนี้</button>
    </div>
</div>

<script>
    let currentActiveId = null;
    let currentActivePlate = '';
    let currentActiveName = '';

    document.getElementById('btnSubmit').addEventListener('click', function(e) {
        e.preventDefault();
        startGaTePass();
    });

    function startGaTePass() {
        let name = document.getElementById('name').value.trim();
        let plate = document.getElementById('plate').value.trim();
        let phone = document.getElementById('phone').value.trim();
        let duration = parseInt(document.getElementById('duration').value);

        if(!name || !plate || !phone) {
            alert('กรุณากรอกข้อมูลให้ครบถ้วนครับ!');
            return;
        }

        let totalSeconds = duration * 60;
        let id = Date.now();

        let card = document.createElement('div');
        card.className = 'card';
        card.id = 'card-' + id;
        
        card.innerHTML = `
            <div class="timer" id="timer-${id}">${duration}:00</div>
            <div class="info-text">
                <strong>ทะเบียน:</strong> ${plate} <br>
                <strong>ชื่อ:</strong> ${name} | <strong>โทร:</strong> ${phone}<br>
                <span class="status-badge status-outside" id="badge-${id}">📍 สถานะ: อยู่ข้างนอกสถาบัน</span>
            </div>
            <button class="gps-check-btn" 
                    data-id="${id}" 
                    data-plate="${plate}" 
                    data-name="${name}" 
                    style="background-color:#3498db; margin-top:10px; padding:10px;">
                กลับเข้าสถาบันแล้ว (ยืนยันพิกัด GPS)
            </button>
        `;

        document.getElementById('list-container').appendChild(card);

        document.getElementById('name').value = '';
        document.getElementById('plate').value = '';
        document.getElementById('phone').value = '';

        let countdown = setInterval(function() {
            totalSeconds--;
            let mins = Math.floor(totalSeconds / 60);
            let secs = totalSeconds % 60;
            
            let displayMins = mins < 10 ? '0' + mins : mins;
            let displaySecs = secs < 10 ? '0' + secs : secs;
            
            let timerElement = document.getElementById(`timer-${id}`);
            
            if (timerElement) {
                timerElement.innerText = displayMins + ':' + displaySecs;
                
                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    timerElement.innerText = "หมดเวลา!";
                    timerElement.classList.add('timeout');
                    document.getElementById('card-' + id).style.backgroundColor = '#fdedec';
                }
            } else {
                clearInterval(countdown); 
            }
        }, 1000);
    }

    // แก้ไขบั๊กปุ่มกดไม่ติดบน iOS ด้วย Event Delegation
    document.getElementById('list-container').addEventListener('click', function(e) {
        if (e.target && e.target.classList.contains('gps-check-btn')) {
            e.preventDefault();
            
            let id = e.target.getAttribute('data-id');
            let plate = e.target.getAttribute('data-plate');
            let name = e.target.getAttribute('data-name');
            
            openGPSModal(id, plate, name);
        }
    });

    function openGPSModal(id, plate, name) {
        currentActiveId = id;
        currentActivePlate = plate;
        currentActiveName = name;
        
        document.getElementById('modalTitle').innerText = "🔮 ตรวจสอบพิกัด GPS (iOS Mode)";
        document.getElementById('modalText').innerText = `ระบบกำลังตรวจสอบพิกัดของรถทะเบียน ${plate} (${name})\nกรุณาเลือกสถานการณ์จำลองเพื่อทดสอบระบบ:`;
        
        document.getElementById('modalActionButtons').style.display = 'flex';
        document.getElementById('btnCloseModal').style.display = 'none';
        document.getElementById('gpsModal').style.display = 'flex';
    }

    document.getElementById('btnSuccess').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('modalTitle').innerText = "✅ ตรวจสอบพิกัดสำเร็จ!";
        document.getElementById('modalText').innerText = `นักเรียนอยู่ภายในพื้นที่สถาบันเรียบร้อยแล้ว (ระยะห่างปัจจุบัน 12 เมตร)\n\nทำการเคลียร์รายชื่อออกจากหน้าจอมอนิเตอร์สำเร็จ`;
        
        document.getElementById('modalActionButtons').style.display = 'none';
        document.getElementById('btnCloseModal').style.display = 'block';
        
        let element = document.getElementById('card-' + currentActiveId);
        if (element) element.remove();
    });

    document.getElementById('btnFail').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('modalTitle').innerText = "❌ ปฏิเสธการบันทึกเวลา!";
        document.getElementById('modalText').innerText = `⚠️ แจ้งเตือนทุจริต: ระบบตรวจพบพิกัดว่ารถทะเบียน ${currentActivePlate} อยู่ห่างจากสถาบันถึง 450 เมตร!\n\nระบบล็อกการทำงานและปฏิเสธขากลับจนกว่าจะเข้าพื้นที่จริง`;
        
        document.getElementById('modalActionButtons').style.display = 'none';
        document.getElementById('btnCloseModal').style.display = 'block';
        
        let cardElement = document.getElementById('card-' + currentActiveId);
        if (cardElement) cardElement.style.backgroundColor = '#ffeaa7';
        
        let badgeElement = document.getElementById('badge-' + currentActiveId);
        if (badgeElement) {
            badgeElement.innerText = "🚨 พิกัดทุจริต: อยู่ข้างนอก!";
            badgeElement.style.backgroundColor = '#d63031';
            badgeElement.style.color = 'white';
        }
    });

    document.getElementById('btnCloseModal').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('gpsModal').style.display = 'none';
    });
</script>

</body>
</html>
